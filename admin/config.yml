backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Architectural Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Project Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Commercial", "Residential", "Interior", "Renovation"]
      - label: "Project Year & Location"
        name: "details"
        widget: "string"
      - label: "Featured Hero Image"
        name: "thumbnail"
        widget: "image"
      - label: "Project Description"
        name: "body"
        widget: "markdown"
